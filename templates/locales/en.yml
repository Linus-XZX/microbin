guide:
  header: "Options"

# Shared in guide and index pages
upload:
  expiration:
    title: "Expiration"
    dropdown: "Expire after"
    desc: "Use the expiration dropdown to choose how long you want your upload to exist. When the selected time has expired, it will be removed from the server."
    1min: "1 minute"
    10min: "10 minutes"
    1hour: "1 hour"
    24hour: "24 hours"
    3days: "3 days"
    1week: "1 week"
    1month: "1 month"
    6months: "6 months"
    1year: "1 year"
    2years: "2 years"
    4years: "4 years"
    8years: "8 years"
    16years: "16 years"
    never: "Never Expire"
  burn:
    title: "Burn After"
    dropdown: "Burn after"
    desc: "Use the burn after dropdown to set a limit on how many times your data can be accessed before it will be removed from the server."
    nolimit: "No Limit"
    1read: "First Read"
    xread: "%{count}th Read"
  highlight:
    title: "Syntax"
    guide_title: "Syntax Highlighting"
    desc: "Use the syntax highlighting dropdown to enable syntax highlighting for your upload, making it easier to read. You may choose to have the syntax highlighting done by your browser, which will also recognise the language automatically. You can select server-side highlighting, where you need to select the language yourself, but the code will get highlighting without javascript."
    none: "None"
    auto: "Automatic"
    client: "Client-Rendered"
    server: "Server-Rendered"
  password:
    title: "Password"
    desc: "Use the password field to set a password for your upload. This will encrypt your data while stored on our server with your password, and you will need to enter the password to access (in case of private and secret uploads) or to modify (in case of read-only uploads). Your password is encrypted, and in case of secret uploads, we never even see it."
  privacy:
    title: "Privacy"
    desc: "Use this dropdown to select the level of protection your upload needs. Use lower privacy levels if you or your organisation host MicroBin, and higher privacy levels if you are using a public MicroBin service."
    xlevel: "Level %{level}: "
    groups:
      # TODO: Revise tag wording
      unprotected: "Unencrypted (no password)"
      protected: "Unencrypted (protected)"
      secured: "Encrypted"
    public:
      title: "Public"
      desc: "This privacy level allows everyone to find, see, modify and remove your upload."
    unlisted:
      title: "Unlisted (recommended)"
      desc: "Unlisted uploads cannot be found unless someone knows its unique, random identifier. If someone knows this identifier, they can see, modify and remove the upload."
    readonly:
      title: "Read-only"
      desc: "With this privacy setting, the upload cannot be found unless someone knows its unique, random identifier. If someone knows this identifier, they can see the contents but cannot modify or remove it without entering the password of the upload."
    private:
      title: "Private"
      desc: "With this privacy setting, the upload cannot be found unless someone knows its unique, random identifier. If someone knows this identifier, they cannot see, modify or remove it without entering the password of the upload. Your upload and its attachments are encrypted, so they are stored safely."
    # Inb4 we get scrappers here
    secret:
      title: "Secret"
      desc: "With this privacy setting, the upload cannot be found unless someone knows its unique, random identifier. If someone knows this identifier, they cannot see, modify or remove it without entering the password of the upload. Your browser sends us an already encrypted version, so the unencrypted data and password never even leave your device. This option requires you to enter your password many times when accessing your data, but is extremely safe."

